<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Wedding invitation for Amine Beji and Sara Latrache">
  <defs>
    <pattern id="polka" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="5" fill="#1a1a1a"/>
    </pattern>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f0dc"/>
      <stop offset="100%" stop-color="#e8d8b8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#fffef9"/>
  <rect width="1200" height="630" fill="url(#polka)" opacity="0.12"/>
  <rect x="220" y="90" width="760" height="450" rx="6" fill="url(#paper)" stroke="#7b2d8e" stroke-width="3"/>
  <text x="600" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="#7b2d8e" font-style="italic">You&apos;re Invited</text>
  <text x="600" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="58" fill="#1a1a1a" font-weight="bold">Amine Beji</text>
  <text x="600" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="#c9a227" font-style="italic">&amp;</text>
  <text x="600" y="395" text-anchor="middle" font-family="Georgia, serif" font-size="58" fill="#7b2d8e" font-weight="bold">Sara Latrache</text>
  <text x="600" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#1a1a1a">June 27  29, 2026 · Tunisia</text>
  <text x="600" y="510" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#7b2d8e">Sousse · Hammamet · Palladium</text>
</svg>
